services:
  web-frontend:
    build:
      context: .  # repo root
      dockerfile: frontend/apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    container_name: web-frontend
    labels:
      - "description=Frontend available at http://localhost"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "10000:10000"
    env_file:
      - .env
      - ./backend/.env
    command: go run main.go
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
    networks:
      - app-network
    container_name: backend
    labels:
      - "description=Backend available at http://localhost:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,lambda,iam,logs
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - ./infra/modules/main/lambda_function.zip:/tmp/lambda-zip/lambda_function.zip:ro
    networks:
      - app-network
    container_name: localstack
    profiles:
      - localstack
    healthcheck:
      test: ["CMD", "awslocal", "sqs", "list-queues"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  app-network:
    driver: bridge
